<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sadece Yuvarlak Bir Buton</title>
    <style>
        body { 
            background: white; /* Bembeyaz arka plan */
            color: black; text-align: center; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: background 0.3s ease;
        }
        #status { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; transition: color 0.3s; padding: 0 10px; z-index: 5; }
        #topMsg { display: none; font-size: 1.8rem; font-weight: bold; color: red; margin-bottom: 20px; position: fixed; top: 20px; width: 100%; text-align: center; z-index: 25; text-shadow: 0 0 10px #000; } /* Final kandırıldın yazısı */

        .btn {
            background: red; /* Kırmızı buton */
            color: white; padding: 0; border: none;
            /* YUVARLAK YAPMA */
            width: 80px; height: 80px; border-radius: 50%;
            font-weight: bold; font-size: 0.9rem;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: none; /* Işınlanırken iz bırakmaması için geçiş efekti kapalı */
            cursor: pointer; z-index: 10;
        }

        /* 3. basıştan sonraki korkunç buton stili */
        .scaryBtn {
            background: #400 !important;
            color: #f00 !important;
            border: 2px solid #f00 !important;
            box-shadow: 0 0 15px #f00;
        }

        /* Final Goril Fotoğrafı (Gerçek Orta Parmak, Tam Ekran) */
        #finalGoril {
            display: none; position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; /* Fotoğrafı sündürmez, tamamını gösterir */
            background: black; /* Arka plan siyah kalır */
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="topMsg">HAHA KANDIRILDIN</div>
    <div id="status">BUTONA BAS</div>
    <button id="runBtn" class="btn">BAS</button>
    
    <img id="finalGoril" src="https://i.ibb.co/vz6mD8Y/angry-gorilla.jpg" alt="MIDDLE FINGER GORILLA">

    <script>
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const topMsg = document.getElementById('topMsg');
        const goril = document.getElementById('finalGoril');
        const body = document.body;
        
        let clickCount = 0;
        let isTeleporting = false;
        let teleportInterval;

        // Rastgele ışınlanma fonksiyonu
        function isinla() {
            const newTop = Math.random() * 70 + 15; // %15 - %85 arası
            const newLeft = Math.random() * 70 + 15;
            btn.style.top = newTop + "%";
            btn.style.left = newLeft + "%";
        }

        // Dokunmatik ve tıklama olayları
        const handlePress = function(e) {
            e.preventDefault();
            clickCount++;

            // Işınlanma modundaysa ve basmayı becerdiyse
            if (isTeleporting) {
                clearInterval(teleportInterval); // Işınlanmayı durdur
                isTeleporting = false;
                
                // Ekranı eski haline getir
                body.style.background = "white";
                status.style.color = "black";
                status.innerText = "BAŞARDIN İŞTE ÖDÜLÜN İÇİN SON KEZ BAS";
                status.style.display = "block";
                
                // Butonu sabitle ve eski haline getir
                btn.classList.remove('scaryBtn');
                btn.style.top = "50%"; btn.style.left = "50%";
                btn.style.background = "red"; btn.style.color = "white";
                btn.innerText = "SON BAS";
                
                return; // Döngüden çık
            }

            if (clickCount === 1) {
                isinla();
                status.innerText = "-SADECE BUKADARMI DOSTUM?-";
            } 
            else if (clickCount === 2) {
                isinla();
                status.innerText = "-HAHA ÇOK SAKARSIN-";
            } 
            else if (clickCount === 3) {
                // 3. BASIŞ: Korkunç mod ve otomatik ışınlanma başlar
                status.innerText = "-BU BİR HATAYDI-";
                status.style.color = "red";
                body.style.background = "black";
                
                btn.classList.add('scaryBtn');
                btn.innerText = "YAKALA";
                
                isTeleporting = true;
                teleportInterval = setInterval(isinla, 120); // Daha da hızlı (120ms)
            } 
            else if (clickCount === 4) {
                // 4. BASIŞ (FİNAL): Gorili göster
                btn.style.display = "none";
                status.style.display = "none";
                goril.style.display = "block";
                topMsg.style.display = "block"; // Yukardaki kandırıldın yazısı
                body.style.background = "black";
            }
        };

        // Hem dokunma hem tıklama için
        btn.addEventListener('touchstart', handlePress);
        btn.addEventListener('click', handlePress);
    </script>
</body>
</html>
